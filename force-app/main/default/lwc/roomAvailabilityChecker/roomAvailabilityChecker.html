<template>
  <lightning-card title="Chequear disponibilidad">
    <div class="slds-p-horizontal_medium">
      <c-room-picker
        property-id={recordId}
        onroomselect={handleRoomSelect}
      ></c-room-picker>

      <template lwc:if={blockedRanges}>
        <p>Fechas ya reservadas:</p>
        <template for:each={blockedRanges} for:item="range">
          <p key={range.id}>{range.label}</p>
        </template>
      </template>

      <c-date-range-picker
        ondaterangechange={handleDateRangeChange}
      ></c-date-range-picker>

      <lightning-button
        label="Verificar disponibilidad"
        disabled={cannotCheck}
        onclick={handleCheckAvailability}
      ></lightning-button>

      <c-availability-result
        is-available={isAvailable}
        has-checked={hasBeenChecked}
      ></c-availability-result>

      <template lwc:if={isAvailable}>
        <lightning-record-picker
          label="Huésped"
          object-api-name="Contact"
          onchange={handleGuestSelect}
        ></lightning-record-picker>

        <lightning-button
          label="Crear reserva"
          disabled={cannotCreate}
          onclick={handleCreateReservation}
        ></lightning-button>

        <template lwc:if={reservationCreated}>
          <p>Reserva creada con éxito ✅</p>
        </template>
        <template lwc:if={createError}>
          <p class="slds-text-color_error">{createError}</p>
        </template>
      </template>
    </div>
  </lightning-card>
</template>
